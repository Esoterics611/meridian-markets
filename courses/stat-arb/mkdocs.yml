site_name: Statistical Arbitrage — A Working Course
site_description: Course material backing Meridian Markets' Phase 3 stat-arb implementation. Theory → math → code, no marketing voice.
site_url: ''
docs_dir: docs
use_directory_urls: false

# Cross-doc-root links (PHASED_PLAN.md, CLAUDE.md, src/yield/, src/hedge/, etc.) point
# outside docs_dir by design — they're rendered links to repo files, not site-internal
# references. mkdocs --strict would otherwise treat these as fatal warnings.
validation:
  links:
    not_found: ignore
    unrecognized_links: ignore

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - js/mathjax-config.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js

plugins:
  - search

nav:
  - Home: index.md
  - 0. Course charter & sources: 00-charter-and-sources.md
  - 1. What stat arb actually is: 01-introduction.md
  - 2. Cointegration & pairs trading: 02-cointegration.md
  - 3. Ornstein-Uhlenbeck mean reversion: 03-ou-process.md
  - 4. Execution & venue abstraction: 04-execution.md
  - 5. Risk, sizing, circuit breakers: 05-risk.md
  - 6. Backtesting honestly: 06-backtesting.md
  - 7. From paper to production: 07-production.md
  - Appendix A — Code-shape catalogue: appendix-a-code-shapes.md
  - Appendix B — Source notebook (papers, repos, X threads): appendix-b-sources.md
  - Appendix C — Practitioner lore (RohOnChain archive): appendix-c-practitioner-lore.md
  - Research prompt (run in Claude Code desktop): RESEARCH_PROMPT.md
